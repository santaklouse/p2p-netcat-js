name: Deploy p2p-netcat web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Check TypeScript
        working-directory: web
        run: npm run lint

      - name: Build static PWA
        working-directory: web
        shell: bash
        run: |
          repository_name="${GITHUB_REPOSITORY#*/}"
          account_name="${GITHUB_REPOSITORY%%/*}"
          if [[ "${repository_name}" == "${account_name}.github.io" ]]; then
            base_path="/"
          else
            base_path="/${repository_name}/"
          fi
          VITE_BASE_PATH="${base_path}" npm run build -- --base "${base_path}"

      - name: Test static output
        working-directory: web
        run: node --test tests/static-site.test.mjs

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
